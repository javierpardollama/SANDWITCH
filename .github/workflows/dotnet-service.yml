name: Build .NET Service

on:
  push:
    branches: [ main ]    
    paths:
        - 'Sandwitch.Service/**'

  pull_request:
    branches: [ main ]
    paths:
        - 'Sandwitch.Service/**'

permissions:
  contents: read  
  
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true    

defaults:
  run:
    working-directory: Sandwitch.Service

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: 📦 Checkout repository
        uses: actions/checkout@v6

      - name: 🛠️ Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 📥 Restore dependencies
        run: dotnet restore --locked-mode Sandwitch.Service/Sandwitch.Service.csproj 

      - name: ♻️ Clean project
        run: dotnet clean  Sandwitch.Service/Sandwitch.Service.csproj 

      - name: 🏗️ Build project
        run: dotnet build --no-restore Sandwitch.Service/Sandwitch.Service.csproj